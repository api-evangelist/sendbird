        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$399/month (monthly)'
        userMultiplied: false
      - label: MAU
        name: mau
        type: quota
        metric: mau
        limit: 5000
