specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Sendbird
providerId: sendbird
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Chat
  - Messaging
  - In-App Communication
  - MAU
  - SaaS
description: Sendbird prices its Chat product on a Monthly Active User (MAU) tiered subscription model.
  Each plan (Starter, Pro) is offered at multiple MAU tiers (5K, 10K, 25K) with monthly or annual billing
  options; annual billing is discounted. Free Trial gates at 1K MAU and forbids overage. Enterprise is
  custom-priced and supports millions of MAU. Peak concurrent connections are capped at 5% of MAU on Starter
  and Pro.
sources:
  - https://sendbird.com/pricing/chat
plans:
  - id: sendbird-free-trial
    name: Free Trial
    type: freemium
    description: Free Trial with all Pro features available; capped at 1,000 MAU with no overage allowed.
      Community support; no credit card required.
    entries:
      - label: MAU
        name: mau
        type: quota
        metric: mau
        limit: 1000
        timeFrame: month
        geo: global
        unit: 1
        price: '$0'
        userMultiplied: false
      - label: Overage Policy
        name: overage_policy
        type: flat
        metric: month
        limit: 0
        geo: global
        unit: 1
        price: not allowed
        userMultiplied: false
    elements:
      - name: All Pro features
      - name: Community support
      - name: No credit card
  - id: sendbird-starter-5k
    name: Starter (5K MAU)
    type: subscription
    description: Starter plan at 5K MAU tier — messaging essentials, basic moderation, ticketed support.
      Includes 30K free in-app Business Messages. Peak connections capped at 5% of MAU.
    entries:
