specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Sendbird
providerId: sendbird
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Chat
  - Messaging
  - Rate Limiting
description: Sendbird Platform API enforces tier-based rate limits keyed to the application's MAU plan,
  with separate ceilings for GET vs POST/PUT/DELETE. Specific endpoint families (message migration, user
  updates, channel creation, invitations, message sends, mark-as-read) are additionally capped at 5 requests/sec
  regardless of tier. Limits are signaled via X-RateLimit-* headers; throttled requests return HTTP 429
  with code 500910.
sources:
  - https://sendbird.com/docs/chat/platform-api/v3/error-codes/rate-limits
headers:
  limit: X-RateLimit-Limit
  remaining: X-RateLimit-Remaining
  reset: X-RateLimit-Reset
  retryAfter: X-RateLimit-RetryAfter
responseCodes:
  throttled: 429
limits:
  - name: Free trial — GET
    scope: application
    metric: requests_per_second
    limit: 10
    timeFrame: second
  - name: Free trial — POST/PUT/DELETE
    scope: application
    metric: requests_per_second
    limit: 5
    timeFrame: second
  - name: 5K MAU — GET
    scope: application
    metric: requests_per_second
    limit: 60
    timeFrame: second
  - name: 5K MAU — POST/PUT/DELETE
    scope: application
    metric: requests_per_second
    limit: 10
    timeFrame: second
  - name: 10K MAU — GET
    scope: application
    metric: requests_per_second
    limit: 100
    timeFrame: second
  - name: 10K MAU — POST/PUT/DELETE
    scope: application
    metric: requests_per_second
    limit: 20
    timeFrame: second
  - name: 25K MAU — GET
    scope: application
    metric: requests_per_second
    limit: 200
    timeFrame: second
  - name: 25K MAU — POST/PUT/DELETE
    scope: application
    metric: requests_per_second
    limit: 40
    timeFrame: second
  - name: 50K MAU — GET
    scope: application
    metric: requests_per_second
    limit: 400
    timeFrame: second
  - name: 50K MAU — POST/PUT/DELETE
    scope: application
    metric: requests_per_second
    limit: 100
    timeFrame: second
  - name: 100K+ MAU — GET
    scope: application
    metric: requests_per_second
    limit: 600
    timeFrame: second
  - name: 100K+ MAU — POST/PUT/DELETE
    scope: application
    metric: requests_per_second
    limit: 200
    timeFrame: second
  - name: Stricter endpoints (all tiers)
    scope: application/endpoint
    metric: requests_per_second
    limit: 5
    timeFrame: second
    notes: Applies to message migration, user updates (PUT /users/{user_id}), group channel creation,
      invitations, message sends, and mark-as-read endpoints regardless of plan tier.
policies:
  - name: HTTP method tiering
    description: GET endpoints get 2–6× the throughput of mutating methods at the same MAU tier; design
      reads and writes accordingly.
  - name: Endpoint-specific stricter cap
    description: A short list of write-heavy endpoints (channel creation, invitations, message sends,
      mark-as-read, user updates, migration) are pinned at 5/sec irrespective of plan; bulk operations
      should be queued.
  - name: Backoff
    description: On 429 responses, honor X-RateLimit-RetryAfter (seconds) and apply exponential backoff
      with jitter.
  - name: Window signaling
    description: X-RateLimit-Limit is published in the form "N;w=W" (e.g., "100;w=60"); X-RateLimit-Remaining
      and X-RateLimit-Reset reflect the current window.
maintainers:
