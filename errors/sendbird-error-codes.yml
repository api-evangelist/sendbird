source: https://sendbird.com/docs/chat/platform-api/v3/error-codes
description: >-
  Sendbird Platform API numeric error-code registry (the non-payments sibling of
  a decline-code table). Errors are returned in a JSON envelope with fields
  error (bool), code (numeric Sendbird code), and message. HTTP status is 400 for
  most application-level errors; the numeric `code` disambiguates the specific
  condition. Captured verbatim from the docs error reference.
envelope:
  fields:
    - name: error
      type: boolean
      description: Indicates an error occurred.
    - name: code
      type: integer
      description: Sendbird-specific numeric error code.
    - name: message
      type: string
      description: Human-readable error message.
error_codes:
