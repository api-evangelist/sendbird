description: FOCUS-aligned FinOps shape for Sendbird — MAU-tiered subscription with included message
  allowances and add-on products. The dominant cost driver is the MAU tier purchased; secondary drivers
  are peak concurrent connections (capped at 5% of MAU on Starter/Pro), Business Messaging volume, and
  Enterprise add-ons. Annual billing carries a discount over monthly.
sources:
  - https://sendbird.com/pricing/chat
  - https://sendbird.com/docs/chat/platform-api/v3/error-codes/rate-limits
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
