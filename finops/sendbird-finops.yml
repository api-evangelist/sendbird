meters:
  - name: mau
    description: Monthly Active Users — primary tier-pricing meter
    unit: mau
    aggregation: max
    dimensions:
      - application
      - plan
  - name: peak_connections
    description: Peak concurrent WebSocket connections in the billing period (capped at 5% of MAU on
      Starter/Pro)
    unit: connection
    aggregation: max
    dimensions:
      - application
  - name: business_messages
    description: In-app Business Messaging messages sent (30K included on Starter/Pro)
    unit: message
    aggregation: sum
    dimensions:
      - application
      - channel
  - name: subscription_fee
    description: Recurring monthly plan fee (Starter, Pro at MAU tier; Enterprise custom)
    unit: month
    aggregation: sum
    dimensions:
      - plan
      - billing_term
  - name: addon_fees
    description: Enterprise add-on products (e.g., dedicated server, advanced moderation)
    unit: addon
    aggregation: sum
    dimensions:
      - addon
principles:
  - name: Visibility
    description: Use the Sendbird Dashboard's MAU and peak-connection charts plus the Platform API's
      usage endpoints to track tier headroom in real time. Watch for stricter-endpoint throttling (5/sec
      cap) as a leading indicator of write-heavy workloads.
  - name: Allocation
    description: A Sendbird application is the natural allocation unit — split apps per product or environment
      so MAU and message volume map cleanly to teams. Enterprise add-ons are line-item allocated to the
      requesting product.
  - name: Optimization
    description: Stay just under the next MAU tier (5K/10K/25K) to avoid step-function price jumps; prefer
      annual billing for ~12% savings over monthly. Batch user updates and channel creation to respect
      the 5/sec stricter-endpoint cap.
  - name: Accountability
    description: Product engineering owns MAU growth and Platform API hygiene; finance owns the annual
      vs monthly billing decision and Enterprise renewal negotiation.
maintainers:
